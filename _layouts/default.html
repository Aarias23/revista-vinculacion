<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title %}
      {{ page.title }} - {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tus estilos personalizados -->
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">

  <!-- Librería de íconos Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  {% seo %}
</head>

<body>

{% include header.html %}

<main class="container my-4">
  {% include contextual-nav.html %}

  {% if page.print_report %}
  <div class="report-actions">
    <button type="button" class="report-print-btn" data-print-report>
      <i class="fa-solid fa-print" aria-hidden="true"></i>
      Imprimir informe
    </button>
  </div>
  {% endif %}

  {{ content }}
</main>

{% include footer.html %}

<!-- Lightbox container global -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Visor de imágenes" aria-hidden="true">
  <button type="button" class="lightbox-close" aria-label="Cerrar visor">&times;</button>
  <img class="lightbox-content" id="lightbox-img" alt="">
  <div id="lightbox-caption" class="lightbox-caption"></div>
  <div id="lightbox-counter" class="lightbox-counter"></div>
  <a href="#" id="lightbox-download" class="lightbox-download" download>
    <i class="fa-solid fa-download" aria-hidden="true"></i>
    Descargar imagen
  </a>
  <button type="button" class="lightbox-prev" aria-label="Imagen anterior">&#10094;</button>
  <button type="button" class="lightbox-next" aria-label="Imagen siguiente">&#10095;</button>
</div>

<!-- Referencia al script del lightbox -->
<script src="{{ "/assets/js/lightbox.js" | relative_url }}"></script>
<script src="{{ "/assets/js/site-actions.js" | relative_url }}"></script>

</body>
</html>
