<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>
    {% if page.title %}
      {{ page.title }} - {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tus estilos personalizados -->
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">

  <!-- Librería de íconos Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="bg-primary text-white text-center py-3">
  <h1>{{ site.title }}</h1>
  <nav class="mt-2">
    <a href="{{ "/" | relative_url }}" class="nav-link-custom fw-bold">Inicio</a> |
    <a href="{{ "/visitas/" | relative_url }}" class="nav-link-custom fw-bold">Visitas Técnicas</a> |
    <a href="{{ "/instituciones/" | relative_url }}" class="nav-link-custom fw-bold">Instituciones Visitantes</a> |
    <a href="{{ "/pasantias/" | relative_url }}" class="nav-link-custom fw-bold">Pasantías</a> |
    <a href="{{ "/archivo/" | relative_url }}" class="nav-link-custom fw-bold">Archivo Anual</a> |
    <a href="{{ "/galeria/" | relative_url }}" class="nav-link-custom fw-bold">Galería Fotográfica</a>
  </nav>
</header>

<div class="container my-4">
  {{ content }}
</div>

<footer class="bg-primary text-white text-center py-4 mt-5">
  <p>© 2026 Instituto Politécnico Salesiano Padre Bartolomé Vegh</p>
  <p>Unidad de Vinculación Sectorial · Revista Digital</p>
</footer>

<!-- Lightbox container global -->
<div id="lightbox" class="lightbox">
  <span class="lightbox-close">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
  <div id="lightbox-caption" class="lightbox-caption"></div>
  <div id="lightbox-counter" class="lightbox-counter"></div>
  <a class="lightbox-prev">&#10094;</a>
  <a class="lightbox-next">&#10095;</a>
</div>

<!-- Referencia al script del lightbox -->
<script src="{{ "/assets/js/lightbox.js" | relative_url }}"></script>

</body>
</html>
