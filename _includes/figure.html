<figure
  class="gallery-item"
  {%
  if
  include.event
  %}
  data-event="{{ include.event | escape }}"
  {%
  endif
  %}
>
  <img
    src="{{ include.src | relative_url }}"
    alt="{{ include.alt | escape }}"
    loading="lazy"
  />

  {% if include.caption %}
  <figcaption>{{ include.caption }}</figcaption>
  {% endif %}
</figure>
