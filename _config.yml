title: "Revista Digital – Unidad de Vinculación Sectorial"
description: "Documentación oficial de visitas técnicas, pasantías e instituciones visitantes del Instituto Politécnico Salesiano Padre Bartolomé Vegh"

theme: minima

# URL base (GitHub Pages)
url: "https://aarias23.github.io"
baseurl: "/revista-vinculacion"

# Idioma y zona horaria
lang: es-DO
timezone: America/Santo_Domingo

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Feed
feed:
  path: feed.xml

# IMPORTANTE: assets deben copiarse tal cual al build
include:
  - assets

# 🔥 FIX CLAVE para Windows + TZINFO + Live reload
incremental: false
watch: true
force_polling: true

# Mejora compatibilidad GitHub Pages
future: false
show_drafts: false
